<!-- ABOUT -->
<section id="about" class="block">
  <div class="wrap fade-in">
    <div class="sec-head">
      <span class="sec-en">Company</span>
      <p class="jp-sub">{{ABOUT_SUBTITLE}}</p>
    </div>
    <div class="about-grid">
      <div class="about-photo">
        <img src="{{ABOUT_IMAGE_URL}}" alt="{{ABOUT_IMAGE_ALT}}">
      </div>
      <div class="about-copy">
        <h3>{{ABOUT_HEADLINE}}</h3>
        <p>{{ABOUT_PARAGRAPH_1}}</p>
        <p>{{ABOUT_PARAGRAPH_2}}</p>
        <a href="{{ABOUT_CTA_HREF}}" class="btn-ghost">{{ABOUT_CTA_LABEL}}</a>
      </div>
    </div>
  </div>
</section>
