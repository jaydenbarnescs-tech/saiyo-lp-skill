<!-- ABOUT DETAIL SUB-PAGE -->
<section class="block" style="padding-top:160px">
  <div class="wrap fade-in" style="max-width:900px">
    <a href="{{PARENT_URL}}" class="btn-ghost" style="margin-bottom:40px">← 採用トップに戻る</a>
    <div class="sec-head" style="margin-bottom:40px">
      <span class="sec-en">About</span>
      <p class="jp-sub">{{ABOUT_SUBTITLE}}</p>
    </div>

    <img src="{{HERO_IMAGE_URL}}" alt="{{COMPANY_NAME_JP}}" style="width:100%;border-radius:var(--rad);box-shadow:var(--sh);margin-bottom:48px">

    <h3 style="font-size:1.4rem;font-weight:900;color:var(--c1);margin-bottom:16px">私たちのミッション</h3>
    <p style="color:var(--ct2);line-height:2;margin-bottom:40px">{{MISSION}}</p>

    <h3 style="font-size:1.4rem;font-weight:900;color:var(--c1);margin-bottom:16px">沿革</h3>
    <div style="color:var(--ct2);line-height:2;margin-bottom:40px">
{{HISTORY_TIMELINE}}
    </div>

    <h3 style="font-size:1.4rem;font-weight:900;color:var(--c1);margin-bottom:16px">事業内容</h3>
    <p style="color:var(--ct2);line-height:2;margin-bottom:40px">{{BUSINESS_AREAS}}</p>

    <div style="text-align:center;padding:40px 0">
      <a href="{{PARENT_URL}}" class="btn-main">採用情報を見る →</a>
    </div>
  </div>
</section>
