<!-- MESSAGE -->
<section id="message" class="block">
  <div class="wrap fade-in">
    <div class="sec-head">
      <span class="sec-en">Message</span>
      <p class="jp-sub">{{MESSAGE_SUBTITLE}}</p>
    </div>
    <div class="msg-wrap">
      <div class="msg-portrait"><img src="{{MESSAGE_PORTRAIT_URL}}" alt="{{MESSAGE_NAME}}"></div>
      <p class="msg-quote">{{MESSAGE_QUOTE_JP}}</p>
      <p class="msg-name">{{MESSAGE_NAME}}</p>
      <p class="msg-title">{{MESSAGE_TITLE}}</p>
    </div>
  </div>
</section>
