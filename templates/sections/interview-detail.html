<!-- INTERVIEW DETAIL SUB-PAGE -->
<section class="block" style="padding-top:160px">
  <div class="wrap fade-in">
    <a href="{{PARENT_URL}}" class="btn-ghost" style="margin-bottom:40px">← 採用トップに戻る</a>
    <div class="sec-head" style="margin-bottom:40px">
      <span class="sec-en">Interview</span>
      <p class="jp-sub">{{DEPT_EN}} — {{NAME_JP}}</p>
    </div>
    <div class="about-grid">
      <div class="about-photo">
        <img src="{{PORTRAIT_URL}}" alt="{{NAME_JP}}">
      </div>
      <div class="about-copy">
        <h3>{{INTRO_HEADLINE}}</h3>
        <p>{{INTRO_PARAGRAPH}}</p>
        <p style="font-size:.85rem;color:var(--ct2);margin-top:20px"><strong>入社年:</strong> {{JOIN_YEAR}}<br><strong>学歴:</strong> {{EDUCATION}}<br><strong>担当:</strong> {{ROLE}}</p>
      </div>
    </div>
  </div>
</section>

<section class="block block--alt">
  <div class="wrap fade-in">
    <div style="max-width:820px;margin:0 auto">
{{QA_BLOCKS}}
    </div>
  </div>
</section>

<section class="block">
  <div class="wrap fade-in" style="text-align:center">
    <a href="{{PARENT_URL}}#entry" class="btn-main">エントリーする →</a>
  </div>
</section>
