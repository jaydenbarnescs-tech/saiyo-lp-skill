<!-- ENTRY SUB-PAGE -->
<section class="block" style="padding-top:160px">
  <div class="wrap fade-in" style="max-width:720px">
    <a href="{{PARENT_URL}}" class="btn-ghost" style="margin-bottom:40px">← 採用トップに戻る</a>
    <div class="sec-head" style="margin-bottom:40px">
      <span class="sec-en">Entry</span>
      <p class="jp-sub">エントリーフォーム</p>
    </div>

    <p style="color:var(--ct2);line-height:2;margin-bottom:32px">{{ENTRY_INTRO}}</p>

    <div style="background:#fff;border-radius:var(--rad);box-shadow:var(--sh);padding:40px;margin-bottom:40px">
      <div style="margin-bottom:24px">
        <label style="display:block;font-weight:700;color:var(--c1);margin-bottom:8px;font-size:.9rem">お名前 <span style="color:var(--c2)">*</span></label>
        <input type="text" id="entry-name" style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:.95rem">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-weight:700;color:var(--c1);margin-bottom:8px;font-size:.9rem">メールアドレス <span style="color:var(--c2)">*</span></label>
        <input type="email" id="entry-email" style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:.95rem">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-weight:700;color:var(--c1);margin-bottom:8px;font-size:.9rem">電話番号</label>
        <input type="tel" id="entry-phone" style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:.95rem">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-weight:700;color:var(--c1);margin-bottom:8px;font-size:.9rem">応募職種 <span style="color:var(--c2)">*</span></label>
        <select id="entry-position" style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:.95rem">
{{POSITION_OPTIONS}}
        </select>
      </div>
      <div style="margin-bottom:32px">
        <label style="display:block;font-weight:700;color:var(--c1);margin-bottom:8px;font-size:.9rem">志望動機・メッセージ</label>
        <textarea id="entry-message" rows="5" style="width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:.95rem;resize:vertical"></textarea>
      </div>
      <div style="text-align:center">
        <button onclick="document.location='mailto:{{ENTRY_EMAIL}}?subject=採用エントリー&body='+encodeURIComponent('お名前: '+document.getElementById('entry-name').value+'\nメール: '+document.getElementById('entry-email').value+'\n電話: '+document.getElementById('entry-phone').value+'\n応募職種: '+document.getElementById('entry-position').value+'\n\n'+document.getElementById('entry-message').value)" class="btn-main">送信する →</button>
      </div>
    </div>

    <p style="text-align:center;color:var(--ct2);font-size:.82rem">送信ボタンを押すとメールアプリが開きます。内容を確認の上、送信してください。</p>
  </div>
</section>
